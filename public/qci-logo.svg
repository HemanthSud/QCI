<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Queen City Ishaare logo</title>
  <desc id="desc">A navy circular Queen City Ishaare crest with gold laurel branches, a silver line crown, and silver lettering.</desc>
  <defs>
    <radialGradient id="navyCore" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#0c3157"/>
      <stop offset="0.58" stop-color="#071f38"/>
      <stop offset="1" stop-color="#04111f"/>
    </radialGradient>
    <linearGradient id="goldLeaf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff0a8"/>
      <stop offset="0.23" stop-color="#e7c66d"/>
      <stop offset="0.58" stop-color="#b9852e"/>
      <stop offset="1" stop-color="#ffe6a0"/>
    </linearGradient>
    <linearGradient id="silverLine" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.42" stop-color="#d9dde3"/>
      <stop offset="1" stop-color="#8f9aa7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="metalGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f9e7ad" flood-opacity="0.42"/>
    </filter>
    <path id="leaf" d="M0 0C34-18 66-8 86 20C48 34 18 28 0 0Z"/>
  </defs>

  <rect width="1024" height="1024" fill="#05090d"/>
  <circle cx="512" cy="512" r="442" fill="none" stroke="#222a32" stroke-width="16"/>
  <circle cx="512" cy="512" r="388" fill="url(#navyCore)" stroke="#06111d" stroke-width="12"/>
  <circle cx="512" cy="512" r="384" fill="none" stroke="#0d2a47" stroke-width="4" opacity="0.72"/>

  <g filter="url(#softShadow)">
    <g id="laurel-left" fill="url(#goldLeaf)" stroke="#7d5b20" stroke-linejoin="round" stroke-width="3">
      <path d="M344 785C230 726 166 617 164 504C162 373 237 263 347 202" fill="none" stroke="url(#goldLeaf)" stroke-linecap="round" stroke-width="9"/>
      <use href="#leaf" transform="translate(253 731) rotate(14) scale(.74)"/>
      <use href="#leaf" transform="translate(226 690) rotate(2) scale(.72)"/>
      <use href="#leaf" transform="translate(204 641) rotate(-8) scale(.72)"/>
      <use href="#leaf" transform="translate(189 590) rotate(-18) scale(.72)"/>
      <use href="#leaf" transform="translate(184 537) rotate(-28) scale(.70)"/>
      <use href="#leaf" transform="translate(187 484) rotate(-38) scale(.68)"/>
      <use href="#leaf" transform="translate(199 433) rotate(-48) scale(.66)"/>
      <use href="#leaf" transform="translate(219 386) rotate(-57) scale(.64)"/>
      <use href="#leaf" transform="translate(247 344) rotate(-66) scale(.62)"/>
      <use href="#leaf" transform="translate(280 308) rotate(-76) scale(.58)"/>
      <use href="#leaf" transform="translate(316 278) rotate(-86) scale(.54)"/>
      <circle cx="223" cy="717" r="8"/>
      <circle cx="194" cy="622" r="7"/>
      <circle cx="186" cy="516" r="7"/>
      <circle cx="217" cy="399" r="7"/>
      <circle cx="289" cy="292" r="7"/>
    </g>
    <use href="#laurel-left" transform="translate(1024 0) scale(-1 1)"/>
  </g>

  <g fill="none" filter="url(#metalGlow)" stroke="url(#silverLine)" stroke-linecap="round" stroke-linejoin="round" stroke-width="11">
    <path d="M318 382 426 545 512 294 598 545 706 382"/>
    <path d="M292 350 430 576 512 352 594 576 732 350"/>
    <path d="M272 404 414 566 512 472 610 566 752 404"/>
    <path d="M382 552H642L606 580H418Z"/>
    <path d="M318 382 512 520 706 382"/>
  </g>

  <g font-family="Montserrat, Avenir Next, Helvetica, Arial, sans-serif" text-anchor="middle" filter="url(#softShadow)">
    <text x="512" y="633" fill="url(#silverLine)" font-size="44" font-weight="600" letter-spacing="22">QUEEN CITY</text>
    <text x="512" y="700" fill="url(#silverLine)" font-size="55" font-weight="600" letter-spacing="28">ISHAARE</text>
  </g>
</svg>
